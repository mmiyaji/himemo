plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    id 'com.google.firebase.firebase-perf'
    id 'com.google.firebase.appdistribution'
    // END: FlutterFire Configuration
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def playIntegrityProjectNumber = (System.getenv('HIMEMO_FIREBASE_PROJECT_NUMBER') ?: '247004759100').trim()
def appDistributionTesters = (System.getenv('HIMEMO_APPDIST_TESTERS') ?: '').trim()
def appDistributionGroups = (System.getenv('HIMEMO_APPDIST_GROUPS') ?: '').trim()
def appDistributionReleaseNotes = (System.getenv('HIMEMO_APPDIST_RELEASE_NOTES') ?: '').trim()
def appDistributionReleaseNotesFile = (System.getenv('HIMEMO_APPDIST_RELEASE_NOTES_FILE') ?: '').trim()
def appDistributionCredentials = (
    System.getenv('HIMEMO_APPDIST_SERVICE_CREDENTIALS_FILE')
        ?: System.getenv('GOOGLE_APPLICATION_CREDENTIALS')
        ?: ''
).trim()

android {
    namespace "org.ruhenheim.himemo"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion
    flavorDimensions "environment"

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "org.ruhenheim.himemo"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        buildConfigField "long", "PLAY_INTEGRITY_PROJECT_NUMBER", "${playIntegrityProjectNumber}L"
    }

    productFlavors {
        development {
            dimension "environment"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
            resValue "string", "app_name", "HiMemo Dev"
        }
        production {
            dimension "environment"
            resValue "string", "app_name", "HiMemo"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            firebaseAppDistribution {
                artifactType = "AAB"
                if (appDistributionReleaseNotesFile) {
                    releaseNotesFile = appDistributionReleaseNotesFile
                } else if (appDistributionReleaseNotes) {
                    releaseNotes = appDistributionReleaseNotes
                }
                if (appDistributionTesters) {
                    testers = appDistributionTesters
                }
                if (appDistributionGroups) {
                    groups = appDistributionGroups
                }
                if (appDistributionCredentials) {
                    serviceCredentialsFile = appDistributionCredentials
                }
            }
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:34.4.0')
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-perf'
    implementation 'com.google.android.play:integrity:1.4.0'
}

tasks.register("copyDevelopmentDebugApkForIntegrationTest", Copy) {
    from("${rootProject.projectDir.parentFile}/build/app/outputs/apk/development/debug/app-development-debug.apk")
    into("${rootProject.projectDir.parentFile}/build/app/outputs/flutter-apk")
    rename { "app-debug.apk" }
}

tasks.matching { it.name == "assembleDebug" }.configureEach {
    finalizedBy(tasks.named("copyDevelopmentDebugApkForIntegrationTest"))
}
